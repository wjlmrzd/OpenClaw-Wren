<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw System Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }
        .header h1 {
            font-size: 28px;
            color: #00d4ff;
        }
        .last-update {
            color: #888;
            font-size: 14px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,212,255,0.2);
        }
        .card-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .card-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
        }
        .card-value {
            font-size: 32px;
            font-weight: bold;
        }
        .card-value.green { color: #00ff88; }
        .card-value.yellow { color: #ffd700; }
        .card-value.red { color: #ff4757; }
        .card-value.blue { color: #00d4ff; }
        .card-status {
            margin-top: 10px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        .status-dot.green { background: #00ff88; }
        .status-dot.yellow { background: #ffd700; }
        .status-dot.red { background: #ff4757; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
        }
        .section-title {
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .task-stats {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .stat-badge {
            padding: 12px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        .stat-badge.running { background: rgba(0,255,136,0.15); color: #00ff88; }
        .stat-badge.failed { background: rgba(255,71,87,0.15); color: #ff4757; }
        .stat-badge.paused { background: rgba(255,215,0,0.15); color: #ffd700; }
        .stat-badge.pending { background: rgba(0,212,255,0.15); color: #00d4ff; }
        .recent-list {
            list-style: none;
        }
        .recent-item {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .recent-item .time {
            color: #666;
            font-size: 13px;
            min-width: 50px;
        }
        .recent-item .emoji {
            font-size: 18px;
        }
        .recent-item .text {
            flex: 1;
        }
        .recent-item .status {
            font-size: 13px;
        }
        .recent-item .status.success { color: #00ff88; }
        .recent-item .status.failed { color: #ff4757; }
        .events-list {
            list-style: none;
        }
        .event-item {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.3s;
        }
        .event-item:hover {
            background: rgba(255,255,255,0.08);
        }
        .event-item .time {
            color: #666;
            font-size: 13px;
            min-width: 50px;
        }
        .event-item .emoji {
            font-size: 18px;
        }
        .event-item .text {
            flex: 1;
        }
        .quick-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #fff;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #e0e0e0;
        }
        .btn-danger {
            background: rgba(255,71,87,0.2);
            color: #ff4757;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .footer {
            text-align: center;
            color: #555;
            font-size: 13px;
            margin-top: 30px;
        }
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .task-stats {
                justify-content: center;
            }
            .quick-actions {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔮 OpenClaw System Dashboard</h1>
            <div class="last-update">
                最后更新: <span id="updateTime">--:--:--</span>
                <span style="margin-left: 15px; opacity: 0.6;">🔄 每30秒自动刷新</span>
            </div>
        </div>

        <div class="grid">
            <div class="card" onclick="showDetail('gateway')">
                <div class="card-icon">🚀</div>
                <div class="card-title">Gateway 状态</div>
                <div class="card-value green" id="gatewayStatus">● 健康</div>
                <div class="card-status">
                    <span class="status-dot green"></span>
                    <span id="gatewayUptime">运行中</span>
                </div>
            </div>
            <div class="card" onclick="showDetail('cpu')">
                <div class="card-icon">⚡</div>
                <div class="card-title">CPU 使用率</div>
                <div class="card-value blue" id="cpuValue">--%</div>
                <div class="card-status">实时监控</div>
            </div>
            <div class="card" onclick="showDetail('memory')">
                <div class="card-icon">💾</div>
                <div class="card-title">内存使用率</div>
                <div class="card-value blue" id="memoryValue">--%</div>
                <div class="card-status" id="memoryDetail">-- GB</div>
            </div>
            <div class="card" onclick="showDetail('disk')">
                <div class="card-icon">💿</div>
                <div class="card-title">磁盘使用率</div>
                <div class="card-value yellow" id="diskValue">--%</div>
                <div class="card-status" id="diskDetail">-- GB</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">📊 Cron 任务状态</div>
            <div class="task-stats">
                <div class="stat-badge running">
                    <span>✅</span>
                    <span>运行中: <strong id="runningCount">0</strong></span>
                </div>
                <div class="stat-badge failed">
                    <span>❌</span>
                    <span>失败: <strong id="failedCount">0</strong></span>
                </div>
                <div class="stat-badge paused">
                    <span>⏸️</span>
                    <span>禁用: <strong id="pausedCount">0</strong></span>
                </div>
                <div class="stat-badge pending">
                    <span>⏳</span>
                    <span>待执行: <strong id="pendingCount">0</strong></span>
                </div>
            </div>
            <div class="section-title" style="font-size: 14px; color: #888;">最近执行</div>
            <ul class="recent-list" id="recentTasks">
                <li class="recent-item">
                    <span class="time">--:--</span>
                    <span class="emoji">⏳</span>
                    <span class="text">加载中...</span>
                    <span class="status">--</span>
                </li>
            </ul>
        </div>

        <div class="section">
            <div class="section-title">📋 最近事件</div>
            <ul class="events-list" id="eventsList">
                <li class="event-item">
                    <span class="time">--:--</span>
                    <span class="emoji">⏳</span>
                    <span class="text">加载中...</span>
                </li>
            </ul>
        </div>

        <div class="section">
            <div class="section-title">⚡ 快捷操作</div>
            <div class="quick-actions">
                <button class="btn btn-primary" onclick="doAction('health-check')">
                    🏥 健康检查
                </button>
                <button class="btn btn-secondary" onclick="doAction('clean-logs')">
                    🧹 清理日志
                </button>
                <button class="btn btn-secondary" onclick="doAction('backup')">
                    💾 备份配置
                </button>
                <button class="btn btn-danger" onclick="doAction('restart-gateway')">
                    🔄 重启Gateway
                </button>
                <button class="btn btn-secondary" onclick="refreshData()">
                    🔃 刷新
                </button>
            </div>
        </div>

        <div class="footer">
            OpenClaw System Dashboard v1.0 | 
            <a href="unified-maintenance-console.ps1" style="color: #00d4ff;">打开运维控制台</a>
        </div>
    </div>

    <script>
        let refreshInterval;
        
        // 页面加载时获取数据
        document.addEventListener('DOMContentLoaded', function() {
            refreshData();
            startAutoRefresh();
        });

        // 自动刷新
        function startAutoRefresh() {
            refreshInterval = setInterval(refreshData, 30000);
        }

        // 停止自动刷新
        function stopAutoRefresh() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
        }

        // 更新显示时间
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('updateTime').textContent = timeStr;
        }

        // 获取系统数据
        async function refreshData() {
            updateTime();
            
            try {
                // 模拟获取Gateway状态
                document.getElementById('gatewayStatus').textContent = '● 健康';
                document.getElementById('gatewayStatus').className = 'card-value green';
                document.getElementById('gatewayUptime').textContent = '运行中';
                
                // 模拟CPU/内存/磁盘数据 (实际使用PowerShell获取)
                const mockData = {
                    cpu: Math.floor(Math.random() * 40) + 20,
                    memory: Math.floor(Math.random() * 30) + 40,
                    memoryUsed: (8 + Math.random() * 4).toFixed(1),
                    memoryTotal: 16,
                    disk: Math.floor(Math.random() * 30) + 50,
                    diskUsed: Math.floor(200 + Math.random() * 100),
                    diskTotal: 500
                };
                
                document.getElementById('cpuValue').textContent = mockData.cpu + '%';
                document.getElementById('memoryValue').textContent = mockData.memory + '%';
                document.getElementById('memoryDetail').textContent = mockData.memoryUsed + ' / ' + mockData.memoryTotal + ' GB';
                document.getElementById('diskValue').textContent = mockData.disk + '%';
                document.getElementById('diskDetail').textContent = mockData.diskUsed + ' / ' + mockData.diskTotal + ' GB';
                
                // 更新磁盘颜色
                const diskEl = document.getElementById('diskValue');
                if (mockData.disk > 90) {
                    diskEl.className = 'card-value red';
                } else if (mockData.disk > 80) {
                    diskEl.className = 'card-value yellow';
                } else {
                    diskEl.className = 'card-value blue';
                }
                
                // 模拟任务统计
                document.getElementById('runningCount').textContent = 15 + Math.floor(Math.random() * 5);
                document.getElementById('failedCount').textContent = Math.floor(Math.random() * 2);
                document.getElementById('pausedCount').textContent = 2 + Math.floor(Math.random() * 3);
                document.getElementById('pendingCount').textContent = 1 + Math.floor(Math.random() * 3);
                
                // 最近任务
                const tasks = [
                    { time: '09:00', emoji: '📰', name: '每日早报', status: 'success' },
                    { time: '08:00', emoji: '🏥', name: '健康监控员', status: 'success' },
                    { time: '07:30', emoji: '🌤️', name: '天气播报', status: 'success' },
                    { time: '07:00', emoji: '🏃', name: '运动提醒员', status: 'success' },
                    { time: '06:00', emoji: '📧', name: '邮件检查', status: 'failed' }
                ];
                
                const tasksHtml = tasks.map(t => `
                    <li class="recent-item">
                        <span class="time">${t.time}</span>
                        <span class="emoji">${t.emoji}</span>
                        <span class="text">${t.name}</span>
                        <span class="status ${t.status}">${t.status === 'success' ? '✅' : '❌'}</span>
                    </li>
                `).join('');
                document.getElementById('recentTasks').innerHTML = tasksHtml;
                
                // 最近事件
                const events = [
                    { time: '08:30', emoji: '🔄', text: 'Gateway 重启成功' },
                    { time: '08:15', emoji: '⚠️', text: '磁盘使用率 78%' },
                    { time: '07:00', emoji: '✅', text: '任务全部正常' },
                    { time: '06:00', emoji: '📧', text: '邮件检查失败，已重试' }
                ];
                
                const eventsHtml = events.map(e => `
                    <li class="event-item">
                        <span class="time">${e.time}</span>
                        <span class="emoji">${e.emoji}</span>
                        <span class="text">${e.text}</span>
                    </li>
                `).join('');
                document.getElementById('eventsList').innerHTML = eventsHtml;
                
            } catch (error) {
                console.error('获取数据失败:', error);
            }
        }

        // 查看详情
        function showDetail(type) {
            const messages = {
                'gateway': 'Gateway 运行正常，版本: v0.1.9',
                'cpu': 'CPU 使用正常，当前负载较低',
                'memory': '内存使用正常，无内存泄漏',
                'disk': '磁盘空间充足，请定期清理'
            };
            alert(messages[type] || '详情信息');
        }

        // 执行操作
        async function doAction(action) {
            const confirmMessages = {
                'health-check': '确定运行健康检查吗?',
                'clean-logs': '确定清理日志吗?',
                'backup': '确定备份配置吗?',
                'restart-gateway': '⚠️ 确定重启 Gateway 吗? 这将中断服务!'
            };
            
            if (!confirm(confirmMessages[action])) {
                return;
            }
            
            switch (action) {
                case 'health-check':
                    alert('🏥 正在运行健康检查...\n请打开运维控制台查看详细结果');
                    break;
                case 'clean-logs':
                    alert('🧹 正在清理日志...');
                    break;
                case 'backup':
                    alert('💾 正在备份配置...');
                    break;
                case 'restart-gateway':
                    if (confirm('再次确认: 真的要重启 Gateway 吗?')) {
                        alert('🔄 正在重启 Gateway...');
                    }
                    break;
            }
        }
    </script>
</body>
</html>
