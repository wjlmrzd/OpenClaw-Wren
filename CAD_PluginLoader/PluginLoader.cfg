; ============================================================================
; PluginLoader 配置文件
; ============================================================================
; 版本：1.0.0
; 
; 文件格式说明：
;   每行定义一个插件配置，使用竖线 (|) 分隔各字段
;   格式：Path|Name|Version|Description|Enabled
;
; 字段说明：
;   Path        - 插件文件的完整路径（支持 .lsp、.fas、.vlx 格式）
;   Name        - 插件显示名称（用于在管理界面中显示）
;   Version     - 插件版本号（如：1.0、2.3.1）
;   Description - 插件功能描述
;   Enabled     - 启用状态：1=启用，0=禁用
;
; 注意事项：
;   1. 路径中的反斜杠需要使用双反斜杠 (\\) 或正斜杠 (/)
;   2. 以分号 (;) 或井号 (#) 开头的行为注释
;   3. 空行会被忽略
;   4. 路径必须是绝对路径
;
; 示例：
;   C:\CAD_Plugins\Tools.lsp|绘图工具集|1.0|常用绘图命令|1
;   D:/Plugins/Blocks.vlx|图块库|2.1|标准图块集合|1
;
; ============================================================================

[Plugins]

; ----------------------------------------------------------------------------
; 示例配置 - 请根据实际情况修改或删除
; ----------------------------------------------------------------------------

; 示例 1：绘图工具插件
; C:\CAD_Plugins\DrawingTools.lsp|绘图工具集|1.0|提供常用绘图命令和快捷键|1

; 示例 2：标注工具插件
; C:\CAD_Plugins\DimTools.lsp|标注工具|1.5|增强标注功能|1

; 示例 3：图块管理插件
; C:\CAD_Plugins\BlockManager.vlx|图块管理器|2.0|图块批量处理工具|0

; 示例 4：表格工具插件
; D:\CAD_Plugins\TableTools.lsp|表格工具|1.2|表格创建和编辑|1

; 示例 5：图层管理插件
; D:\CAD_Plugins\LayerTools.fas|图层工具|3.1|图层批量管理|1

; ----------------------------------------------------------------------------
; 在此添加您的插件配置
; ----------------------------------------------------------------------------
; 格式：完整路径 | 插件名称 | 版本号 | 描述 | 启用状态 (1/0)
; 
; 示例：
; C:\MyCADPlugins\MyPlugin.lsp|我的插件|1.0|个人定制插件|1

; ----------------------------------------------------------------------------

